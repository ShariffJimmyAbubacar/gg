<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy Joryll</title>
<link rel="icon" type="image/png" href="girl.jpg"/>
<link rel="stylesheet" href="style.css"/>
<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:0;
    overflow-x: hidden;
    position: relative;
}

canvas{
    border:4px solid #ff5722;
    background:#222;
    display:block;
    margin:20px auto;
    position: relative;
    z-index: 2;
    max-width: 100%;
    height: auto;
}

#flapButton{
    display:inline-block;
    padding:15px 35px;
    font-size:22px;
    margin-top:20px;
    background: linear-gradient(45deg,#ff5722,#ff9800);
    border:3px solid #fff;
    border-radius:12px;
    color:white;
    cursor:pointer;
    transition: all 0.1s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    user-select: none;
    z-index: 3;
    position: relative;
}

#flapButton.active{
    background: linear-gradient(45deg,#ff9800,#ff5722);
    transform: scale(0.95);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5);
}

#restartButton{
    display:block;
    margin: 20px auto;
    padding: 15px 35px;
    font-size: 22px;
    background: linear-gradient(45deg,#ff5722,#ff9800);
    border: 3px solid #fff;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 3;
}
#restartButton:hover{
    transform: scale(1.05);
}

.floating-bg{
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    opacity: 0.6;
    animation: floatBG 10s linear infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes floatBG{
    0% { transform: translateX(-50%) translateY(-100px); }
    50% { transform: translateX(-50%) translateY(200px); }
    100% { transform: translateX(-50%) translateY(-100px); }
}

/* NAVIGATION */
nav{
    background: #111;
    padding: 10px;
    position: relative;
    z-index: 20;
}

nav ul{
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 0;
    padding: 0;
}

nav a{
    color: white;
    text-decoration: none;
}

.menu-toggle{
    display: none;
    font-size: 26px;
    padding: 10px;
    cursor: pointer;
    color: white;
}

/* MOBILE VIEW */
@media (max-width: 768px){

    canvas{
        width: 95% !important;
        height: auto !important;
        margin: 10px auto;
    }

    #flapButton{
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        font-size: 20px;
        padding: 18px;
        z-index: 10;
    }

    #restartButton{
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        font-size: 20px;
        padding: 18px;
        z-index: 10;
    }

    h2{
        font-size: 20px;
        margin-top: 10px;
    }

    nav ul{
        display: none;
        flex-direction: column;
        background: #222;
        position: absolute;
        top: 50px;
        width: 100%;
        left: 0;
    }

    nav ul.show{
        display: flex;
    }

    nav li{
        padding: 15px;
        border-bottom: 1px solid #444;
    }

    .menu-toggle{
        display: block;
    }
}
</style>
</head>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul id="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="jorryl.html">Game</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
</nav>

<body onload="startGame()">

<h2 style="color:#ff9800;">Flappy Joryll</h2>
<div id="game"></div>

<div id="flapButton">Joryll</div>
<button id="restartButton">Restart</button>

<audio id="bgMusic" loop>
<source src="bali.mp3" type="audio/mpeg">
</audio>

<audio id="scoreMusic">
<source src="scoreMusic.mp3" type="audio/mpeg">
</audio>

<audio id="gameOverSound">
<source src="alohaSnackbar.mp3" type="audio/mpeg">
</audio>

<img id="bombImage" src="bomb.jpg" style="display:none; position:absolute; width:80px; z-index:5;">
<img id="waitingGirl" src="girl.jpg" style="display:none; position:absolute; width:70px; z-index:4;">

<script>
function toggleMenu(){
    document.getElementById("nav-list").classList.toggle("show");
}

var myGamePiece;
var myObstacles = [];
var myScore;
var scoreValue = 0;
var gameOver = false;
var scoreEventTriggered = false;
var backgroundX = 0;

/* WAITING GIRL SYSTEM */
var waitingGirl = { x:0, y:250, active:false, following:false };

var backgroundImage = new Image(); backgroundImage.src = "back.png";
var wallImage = new Image(); wallImage.src = "wall.png";
var birdImage = new Image(); birdImage.src = "bird.png";
var floatingImageSrc = "bird.png";

var canvasWidth = 900;
var canvasHeight = 500;
var obstacleSpeed = -3;
var gravityDefault = 0.08;
var flapStrength = -0.25;

function startGame(){
    myGamePiece = new component(50,40,birdImage,50,120,"image");
    myGamePiece.gravity = gravityDefault;
    myScore = new component("30px","Consolas","white",canvasWidth-200,50,"text");
    myGameArea.start();
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function(){
        let screenWidth = window.innerWidth;
        if(screenWidth < 768){
            this.canvas.width = screenWidth * 0.95;
            this.canvas.height = 400;
        } else {
            this.canvas.width = canvasWidth;
            this.canvas.height = canvasHeight;
        }
        this.context = this.canvas.getContext("2d");
        document.getElementById("game").appendChild(this.canvas);
        this.frameNo = 0;
        this.interval = setInterval(updateGameArea,20);
    },
    clear : function(){
        backgroundX -= 0.5;
        if(backgroundX <= -this.canvas.width) backgroundX = 0;
        this.context.drawImage(backgroundImage,backgroundX,0,this.canvas.width,this.canvas.height);
        this.context.drawImage(backgroundImage,backgroundX + this.canvas.width,0,this.canvas.width,this.canvas.height);
    }
}

function component(width,height,color,x,y,type){
    this.type = type;
    this.width = width;
    this.height = height;
    this.speedX = 0;
    this.speedY = 0;
    this.x = x;
    this.y = y;
    this.gravity = 0;
    this.gravitySpeed = 0;

    this.update = function(){
        let ctx = myGameArea.context;
        if(this.type=="text"){
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = color;
            ctx.fillText(this.text,this.x,this.y);
        } else if(this.type=="image"){
            ctx.save();
            let angle = this.gravitySpeed*3;
            ctx.translate(this.x+this.width/2,this.y+this.height/2);
            ctx.rotate(angle*Math.PI/180);
            ctx.drawImage(color,-this.width/2,-this.height/2,this.width,this.height);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(-this.width/2,-this.height/2,this.width,this.height);
            ctx.restore();
        }
    }

    this.newPos = function(){
        this.gravitySpeed += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY + this.gravitySpeed;
        this.hitBottom();
    }

    this.hitBottom = function(){
        var rockbottom = myGameArea.canvas.height - this.height;
        if(this.y>rockbottom){ this.y = rockbottom; this.gravitySpeed=0; }
        if(this.y<0){ this.y=0; this.gravitySpeed=0; }
    }

    this.crashWith = function(otherobj){
        var myleft=this.x, myright=this.x+this.width, mytop=this.y, mybottom=this.y+this.height;
        var otherleft=otherobj.x, otherright=otherobj.x+otherobj.width, othertop=otherobj.y, otherbottom=otherobj.y+otherobj.height;
        var crash = !(mybottom<othertop || mytop>otherbottom || myright<otherleft || myleft>otherright);
        return crash;
    }
}

function updateGameArea(){
    if(gameOver) return;
    var x,height,gap,minHeight,maxHeight,minGap,maxGap;
    for(i=0;i<myObstacles.length;i++){
        if(myGamePiece.crashWith(myObstacles[i])){
            gameOver = true;
            document.getElementById("gameOverSound").play();

            const bomb = document.getElementById("bombImage");
            bomb.style.left=(myGamePiece.x+myGamePiece.width/2-40)+"px";
            bomb.style.top=(myGamePiece.y+myGamePiece.height/2-40)+"px";
            bomb.style.display="block";
            bomb.style.transition="transform 0.5s ease-out, opacity 0.5s ease-out";
            setTimeout(()=>{ bomb.style.transform="scale(2)"; bomb.style.opacity=0; },50);

            let ctx=myGameArea.context;
            ctx.font="40px Arial"; ctx.fillStyle="red";
            ctx.fillText("GAME OVER",myGameArea.canvas.width/2-120,myGameArea.canvas.height/2);

            return;
        }
    }

    myGameArea.clear();
    myGameArea.frameNo +=1;

    if(myGameArea.frameNo==1||everyinterval(120)){
        x=myGameArea.canvas.width;
        minHeight=20; maxHeight=250;
        height=Math.floor(Math.random()*(maxHeight-minHeight+1)+minHeight);
        minGap=100; maxGap=180;
        gap=Math.floor(Math.random()*(maxGap-minGap+1)+minGap);
        myObstacles.push(new component(60,height,wallImage,x,0,"image"));
        myObstacles.push(new component(60,x-height-gap,wallImage,x,height+gap,"image"));
    }

    for(i=0;i<myObstacles.length;i++){
        myObstacles[i].x+=obstacleSpeed;
        myObstacles[i].update();
        if(!myObstacles[i].scored && myObstacles[i].y===0 && myObstacles[i].x+myObstacles[i].width<myGamePiece.x){
            scoreValue+=100; myObstacles[i].scored=true;
            if(scoreValue===200 && !scoreEventTriggered){
                scoreEventTriggered=true;
                document.getElementById("scoreMusic").play();
                showFloatingImage();
            }
            if(scoreValue===300 && !waitingGirl.active){
                waitingGirl.x=myObstacles[i].x+80;
                waitingGirl.y=220;
                showWaitingGirl();
            }
        }
    }

    myScore.text="SCORE: "+scoreValue;
    myScore.update();
    myGamePiece.newPos();
    myGamePiece.update();

    if(waitingGirl.active && !waitingGirl.following){
        if(myGamePiece.x>waitingGirl.x) waitingGirl.following=true;
    }

    updateGirl();
}

function everyinterval(n){ return (myGameArea.frameNo/n)%1==0; }

const flapButton=document.getElementById("flapButton");
const restartButton=document.getElementById("restartButton");

function flap(){
    document.getElementById("bgMusic").play();
    myGamePiece.gravity=flapStrength;
    flapButton.classList.add("active");
    setTimeout(()=>{ myGamePiece.gravity=gravityDefault; flapButton.classList.remove("active"); },150);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space") flap();
});
document.addEventListener("mousedown",e=>{ if(e.button===0) flap(); });
document.addEventListener("touchstart",e=>{ flap(); }); // mobile touch
flapButton.addEventListener("mousedown",flap);

restartButton.addEventListener("click", ()=>{ location.reload(); });

function showFloatingImage(){
    var img=document.createElement("img");
    img.src=floatingImageSrc; img.className="floating-bg";
    document.body.appendChild(img);
}

function showWaitingGirl(){
    var girl=document.getElementById("waitingGirl");
    girl.style.display="block"; girl.style.left=waitingGirl.x+"px"; girl.style.top=waitingGirl.y+"px";
    waitingGirl.active=true;
}

function updateGirl(){
    if(!waitingGirl.active) return;
    var girl=document.getElementById("waitingGirl");
    if(waitingGirl.following){
        waitingGirl.x += ((myGamePiece.x - 60) - waitingGirl.x)*0.05;
        waitingGirl.y += ((myGamePiece.y + 20) - waitingGirl.y)*0.05;
    }
    girl.style.left=waitingGirl.x+"px"; girl.style.top=waitingGirl.y+"px";
}
</script>

</body>
</html>
